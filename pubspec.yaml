name: growductive
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.0
  cloud_firestore: ^5.5.0
  provider: ^6.1.2  # Highly recommended for MVVM state management
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^5.0.2
  google_fonts: ^8.0.2
  flutter_staggered_grid_view: ^0.7.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  # Android 8+ adaptive icon: black artwork on solid background (transparent → white)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/app_icon.png

flutter:
  uses-material-design: true
